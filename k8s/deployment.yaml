apiVersion: apps/v1
kind: Deployment
metadata:
  name: presidio-dashboard-deployment
  namespace: default
  labels:
    app: presidio-dashboard
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: presidio-dashboard
  template:
    metadata:
      labels:
        app: presidio-dashboard
    spec:
      containers:
        - name: dashboard-web
          image: presidio-devops-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
